<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 6px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
#zone {
  border: 2px dashed #d1d9e0;
  border-radius: 8px;
  padding: 14px 12px;
  text-align: center;
  color: #57606a;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  background: #f6f8fa;
  outline: none;
  user-select: none;
}
#zone:focus { border-color: #0969da; background: #f0f7ff; box-shadow: 0 0 0 2px #b3d9f7; }
#zone.drag  { border-color: #0969da; background: #ddf4ff; }
#zone.has-img { border-style: solid; border-color: #0969da; background: #f0f7ff; }
kbd {
  background: #eaeef2; border: 1px solid #c8d0da; border-radius: 4px;
  padding: 1px 5px; font-size: 11px; font-family: monospace;
}
#previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
.thumb-wrap { position: relative; display: inline-block; }
.thumb { height: 72px; width: auto; max-width: 120px; border-radius: 6px; border: 1px solid #d1d9e0; display: block; object-fit: cover; }
.del {
  position: absolute; top: -6px; right: -6px;
  background: #cf222e; color: white; border: none;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 13px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.del:hover { background: #a40e26; }
#hint { font-size: 11px; color: #0969da; margin-top: 6px; font-weight: 500; }
.tip { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div id="zone" tabindex="0">
  <div>📋 点击这里，然后按 <kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴图片 &nbsp;·&nbsp; 或将图片拖拽至此</div>
  <div class="tip">支持多张，PNG / JPG</div>
  <div id="previews"></div>
  <div id="hint"></div>
</div>

<script>
let images = [];

function send() {
  Streamlit.setComponentValue(images.length > 0 ? [...images] : null);
}

function resize() {
  setTimeout(() => Streamlit.setFrameHeight(document.body.scrollHeight + 8), 60);
}

function removeAt(idx) {
  images.splice(idx, 1);
  render();
  send();
}

function render() {
  const prev = document.getElementById('previews');
  const hint = document.getElementById('hint');
  const zone = document.getElementById('zone');
  prev.innerHTML = '';
  images.forEach((uri, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    const img = document.createElement('img');
    img.src = uri;
    img.className = 'thumb';
    const btn = document.createElement('button');
    btn.className = 'del';
    btn.textContent = '×';
    btn.title = '移除';
    btn.onclick = (e) => { e.stopPropagation(); removeAt(i); };
    wrap.appendChild(img);
    wrap.appendChild(btn);
    prev.appendChild(wrap);
  });
  hint.textContent = images.length > 0 ? `已添加 ${images.length} 张图片` : '';
  zone.classList.toggle('has-img', images.length > 0);
  resize();
}

async function readFile(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.readAsDataURL(file);
  });
}

async function addFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const url = await readFile(f);
    images.push(url);
  }
  render();
  send();
}

// Paste
document.addEventListener('paste', async (e) => {
  const items = [...(e.clipboardData?.items || [])].filter(i => i.type.startsWith('image'));
  if (items.length === 0) return;
  e.preventDefault();
  for (const item of items) {
    const blob = item.getAsFile();
    const url = await readFile(blob);
    images.push(url);
  }
  render();
  send();
});

// Drag & drop
const zone = document.getElementById('zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', async e => {
  e.preventDefault();
  zone.classList.remove('drag');
  await addFiles([...e.dataTransfer.files]);
});

// Click to focus so Ctrl+V works
zone.addEventListener('click', () => zone.focus());

Streamlit.setComponentReady();
Streamlit.setFrameHeight(90);
</script>
</body>
</html>
